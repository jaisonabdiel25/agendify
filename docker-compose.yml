services:
  postgres:
    image: postgres:16-alpine
    container_name: agendify_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agendify
      POSTGRES_PASSWORD: agendify_secret
      POSTGRES_DB: agendify_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendify -d agendify_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
