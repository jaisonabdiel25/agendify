<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Agendify icon blanco y negro</title>
  <desc>Ícono de Agendify en blanco, negro y gris sin texto</desc>

  <style>
    .bg-card { fill: #1a1a1a; }
    .bg-header { fill: #111111; }
    .dot { fill: #555555; }
    .dot-active { fill: #ffffff; }
    .dot-accent { fill: #aaaaaa; }
    .bolt { fill: #ffffff; }
    .ring { fill: none; stroke: #888888; stroke-width: 6; }
    .peg { fill: #ffffff; }
    .border { fill: none; stroke: #333333; stroke-width: 3; }
  </style>

  <rect x="100" y="60" width="480" height="560" rx="64" class="bg-card"/>
  <rect x="100" y="60" width="480" height="140" rx="64" class="bg-header"/>
  <rect x="100" y="160" width="480" height="40" class="bg-header"/>
  <rect x="100" y="60" width="480" height="560" rx="64" class="border"/>

  <rect x="230" y="36" width="32" height="72" rx="16" class="peg"/>
  <rect x="418" y="36" width="32" height="72" rx="16" class="peg"/>

  <circle cx="200" cy="300" r="14" class="dot"/>
  <circle cx="270" cy="300" r="14" class="dot"/>
  <circle cx="340" cy="300" r="14" class="dot-accent"/>
  <circle cx="410" cy="300" r="14" class="dot"/>
  <circle cx="480" cy="300" r="14" class="dot"/>

  <circle cx="200" cy="390" r="14" class="dot-active"/>
  <circle cx="270" cy="390" r="14" class="dot"/>
  <circle cx="340" cy="390" r="32" fill="#333333"/>
  <polygon points="355,358 325,398 345,398 325,422 365,378 343,378" class="bolt"/>
  <circle cx="410" cy="390" r="14" class="dot-active"/>
  <circle cx="480" cy="390" r="14" class="dot"/>

  <circle cx="200" cy="480" r="14" class="dot"/>
  <circle cx="270" cy="480" r="14" class="dot-active"/>
  <circle cx="340" cy="480" r="14" class="dot"/>
  <circle cx="410" cy="480" r="14" class="dot"/>
  <circle cx="480" cy="480" r="14" class="dot" opacity="0.3"/>

  <circle cx="340" cy="390" r="46" class="ring" opacity="0.4"/>
</svg>
